name: Publish to GitHub Packages

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Publish target'
        required: true
        default: 'github'
        type: choice
        options:
          - github
          - mavenLocal

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate build
        run: ./gradlew build test --no-daemon

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'release' || github.event.inputs.publish_target == 'github' }}
        run: ./gradlew :sdk:publish --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_githubUser: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Maven Local (dry run)
        if: ${{ github.event.inputs.publish_target == 'mavenLocal' }}
        run: ./gradlew :sdk:publishToMavenLocal --no-daemon

      - name: Upload published artifacts
        uses: actions/upload-artifact@v4
        with:
          name: published-sdk
          path: |
            sdk/build/libs/*.jar
            sdk/build/publications/
